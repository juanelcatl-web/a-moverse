<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Moverse! | Health & Movement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; touch-action: manipulation; }
        .card { background: white; border-radius: 2.5rem; padding: 2rem; }
        .btn-time, .btn-exercise { transition: all 0.2s; border: 2px solid transparent; }
        .selected { border-color: #4f46e5; background: #eef2ff !important; color: #4f46e5; font-weight: 800; transform: scale(1.02); }
        .bg-app-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #main-timer { font-variant-numeric: tabular-nums; letter-spacing: -3px; }
        .pulse-active { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto space-y-6">
        
        <header class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-3xl font-black italic text-indigo-600 tracking-tighter uppercase leading-none">A MOVERSE!</h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Health & Movement 2026</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-2xl border flex items-center gap-2">
                <span class="text-xs">🏆</span>
                <span id="streak-count" class="text-xs font-black text-slate-700">0</span>
            </div>
        </header>

        <div id="timer-card" class="card text-center relative overflow-hidden shadow-2xl transition-all duration-500">
            <div id="exercise-overlay" class="hidden absolute inset-0 bg-app-gradient text-white flex flex-col items-center justify-center z-20 p-6">
                <p class="text-xs uppercase font-black mb-1 tracking-[0.3em] animate-pulse">¡Cuerpo en acción!</p>
                <h2 id="ex-name-display" class="text-4xl font-black mb-4 uppercase italic">SENTADILLAS</h2>
                <div id="ex-timer" class="text-8xl font-black italic">60</div>
            </div>
            <p class="text-slate-400 font-black uppercase tracking-[0.2em] text-[10px] mb-2">Siguiente Pausa</p>
            <div id="main-timer" class="text-8xl font-black text-slate-900 italic mb-4">30:00</div>
            <div class="inline-block px-4 py-1 rounded-full bg-indigo-50 text-indigo-500 font-black text-[9px] uppercase tracking-widest">Sincronizado</div>
        </div>

        <div class="card shadow-xl space-y-6">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setTime(15, this)" class="btn-time bg-slate-100 py-3 rounded-xl text-[10px] font-black uppercase">15m</button>
                <button onclick="setTime(30, this)" class="btn-time bg-slate-100 py-3 rounded-xl text-[10px] font-black uppercase selected">30m</button>
                <button onclick="setTime(60, this)" class="btn-time bg-slate-100 py-3 rounded-xl text-[10px] font-black uppercase">60m</button>
                <button onclick="setTime(0.1, this)" class="btn-time bg-indigo-100 py-3 rounded-xl text-[10px] font-black uppercase text-indigo-600">Test</button>
            </div>

            <div class="grid grid-cols-1 gap-2" id="exercise-list">
                <button onclick="setEx('Sentadillas', this)" class="btn-exercise p-4 bg-slate-50 rounded-2xl text-left flex items-center gap-4 selected">
                    <span class="text-2xl">🦵</span>
                    <div><p class="font-black text-xs uppercase">Sentadillas</p></div>
                </button>
                <button onclick="setEx('Estirar', this)" class="btn-exercise p-4 bg-slate-50 rounded-2xl text-left flex items-center gap-4">
                    <span class="text-2xl">🙆‍♂️</span>
                    <div><p class="font-black text-xs uppercase">Estiramiento</p></div>
                </button>
                <button onclick="setEx('Respiración', this)" class="btn-exercise p-4 bg-slate-50 rounded-2xl text-left flex items-center gap-4">
                    <span class="text-2xl">🫁</span>
                    <div><p class="font-black text-xs uppercase">Respiración</p></div>
                </button>
            </div>

            <button id="main-btn" onclick="toggleApp()" class="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-lg active:scale-95 transition-all uppercase italic">Activar Monitor</button>
        </div>

        <div id="mini-log" class="px-6 text-center">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-2">Hoy has logrado</p>
            <div id="log-container" class="flex flex-wrap justify-center gap-1">
                </div>
        </div>

        <footer class="text-center py-10 opacity-20 text-[8px] font-black uppercase tracking-widest">
            <p>&copy; 2026 AMOVERSE.NET</p>
        </footer>
    </div>

<script>
    let mainInterval, exInterval, selectedMinutes = 30, selectedExercise = "Sentadillas", isRunning = false, timeLeft = 0, streaks = 0;
    const synth = window.speechSynthesis;

    window.onload = () => {
        const saved = localStorage.getItem('amov_st');
        if(saved) {
            streaks = parseInt(saved);
            document.getElementById('streak-count').innerText = streaks;
            updateLog();
        }
    };

    function setTime(val, el) {
        if(isRunning) return;
        selectedMinutes = val;
        document.querySelectorAll('.btn-time').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        updateDisplay(val * 60);
    }

    function setEx(ex, el) {
        if(isRunning) return;
        selectedExercise = ex;
        document.querySelectorAll('.btn-exercise').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function updateDisplay(secs) {
        const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
        const format = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.getElementById('main-timer').innerText = format;
        document.title = isRunning ? `(${format}) A Moverse!` : "A Moverse!";
    }

    function toggleApp() {
        const btn = document.getElementById('main-btn');
        const card = document.getElementById('timer-card');
        if (!isRunning) {
            isRunning = true;
            btn.innerText = "DETENER"; btn.classList.replace('bg-indigo-600', 'bg-red-500');
            card.classList.add('pulse-active');
            speak("Activado");
            startMainTimer();
        } else {
            isRunning = false;
            clearInterval(mainInterval); clearInterval(exInterval);
            btn.innerText = "ACTIVAR MONITOR"; btn.classList.replace('bg-red-500', 'bg-indigo-600');
            card.classList.remove('pulse-active');
            document.getElementById('exercise-overlay').classList.add('hidden');
            updateDisplay(selectedMinutes * 60);
        }
    }

    function startMainTimer() {
        timeLeft = Math.round(selectedMinutes * 60);
        updateDisplay(timeLeft);
        mainInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) { clearInterval(mainInterval); startExercise(); }
            else { updateDisplay(timeLeft); }
        }, 1000);
    }

    function startExercise() {
        const overlay = document.getElementById('exercise-overlay');
        let exTimeLeft = 60;
        overlay.classList.remove('hidden');
        document.getElementById('ex-name-display').innerText = selectedExercise.toUpperCase();
        speak("Momento de " + selectedExercise);
        
        exInterval = setInterval(() => {
            exTimeLeft--;
            document.getElementById('ex-timer').innerText = exTimeLeft;
            if (exTimeLeft <= 0) {
                clearInterval(exInterval);
                overlay.classList.add('hidden');
                streaks++;
                localStorage.setItem('amov_st', streaks);
                document.getElementById('streak-count').innerText = streaks;
                updateLog();
                speak("¡Logrado!");
                startMainTimer();
            }
        }, 1000);
    }

    function updateLog() {
        const container = document.getElementById('log-container');
        container.innerHTML = "";
        for(let i=0; i<streaks; i++) {
            container.innerHTML += `<span class="text-lg">🔥</span>`;
        }
    }

    function speak(t) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-ES';
        synth.speak(u);
    }
</script>
</body>
</html>
